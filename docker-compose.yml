services:
  # MQTT Broker (Mosquitto) - Core communication hub
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: jumeau_mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # Backend FastAPI - Digital Twin Orchestrator
  backend:
    build: .
    container_name: jumeau_backend
    env_file: .env
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      - mosquitto
      - influxdb

  # Database (InfluxDB 2.0) - Time-series storage for sensors
  influxdb:
    image: influxdb:2.7
    container_name: jumeau_influx
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=jumeau_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

volumes:
  influxdb_data:
